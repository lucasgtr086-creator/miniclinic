<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>統計數據 - MiniClinic</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        h1, h2 { color: #0F2443; }
        nav { background: #0F2443; padding: 12px; border-radius: 8px; margin-bottom: 24px; }
        nav a { color: white; margin-right: 20px; text-decoration: none; font-weight: bold; }
        nav a:hover { color: #5EEAD4; }
        .stat-box { background: #F8FAFC; padding: 20px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid #14B8A6; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #0F2443; color: white; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #E2E8F0; }
    </style>
</head>
<body>
    <nav>
        <a th:href="@{/}">首頁</a>
        <a th:href="@{/doctors}">醫師清單</a>
        <a th:href="@{/login}">醫師登入</a>
        <a th:href="@{/appointment/new}">線上掛號</a>
        <a th:href="@{/appointments}">掛號記錄</a>
        <a th:href="@{/stats}">統計數據</a>
    </nav>

    <h1>診所統計數據</h1>

    <div class="stat-box">
        <h2>基本資料</h2>
        <p>👨‍⚕️ 醫師總數：<strong th:text="${doctorCount}">0</strong></p>
        <p>🧑‍🤝‍🧑 病患總數：<strong th:text="${patientCount}">0</strong></p>
        <p>📅 掛號總數：<strong th:text="${appointmentCount}">0</strong></p>
    </div>

    <div class="stat-box">
        <h2>各科別掛號數統計</h2>
        <table>
            <thead>
                <tr><th>科別</th><th>掛號總數</th></tr>
            </thead>
            <tbody>
                <tr th:each="stat : ${deptStats}">
                    <td th:text="${stat.department}">科別</td>
                    <td th:text="${stat.count}">0</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
